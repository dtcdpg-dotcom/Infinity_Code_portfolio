  <path d="M750 420 L820 380 L890 420 L960 360 L1030 400 L1100 350" stroke="#FB923C" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="1100" cy="350" r="10" fill="#FB923C"/>
