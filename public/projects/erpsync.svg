<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1425"/>
      <stop offset="1" stop-color="#1A2332"/>
    </linearGradient>
    <linearGradient id="erp" x1="300" y1="150" x2="1300" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FB923C" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1350" cy="180" r="200" fill="#22D3EE" fill-opacity="0.2"/>
  <circle cx="250" cy="850" r="240" fill="#FB923C" fill-opacity="0.18"/>
  <rect x="140" y="120" width="1320" height="760" rx="34" fill="#0C1425" stroke="#22D3EE" stroke-opacity="0.3"/>
  <!-- Main Dashboard -->
  <rect x="200" y="200" width="1200" height="600" rx="24" fill="url(#erp)" stroke="#67E8F9" stroke-opacity="0.4"/>
  <!-- Data Flow Arrows -->
  <path d="M350 350 L550 350" stroke="#22D3EE" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M750 350 L950 350" stroke="#22D3EE" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M350 500 L550 500" stroke="#FB923C" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M750 500 L950 500" stroke="#FB923C" stroke-width="6" marker-end="url(#arrow)"/>
