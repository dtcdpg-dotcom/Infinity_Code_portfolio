  <!-- Labels -->
  <text x="290" y="670" fill="#BAE6FD" font-size="16" font-family="Arial, sans-serif">Inventory</text>
  <text x="510" y="670" fill="#BAE6FD" font-size="16" font-family="Arial, sans-serif">Orders</text>
  <text x="730" y="670" fill="#FED7AA" font-size="16" font-family="Arial, sans-serif">Finance</text>
