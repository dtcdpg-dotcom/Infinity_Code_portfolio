  <circle cx="350" cy="350" r="40" fill="#0EA5B7" stroke="#22D3EE" stroke-width="3"/>
  <circle cx="550" cy="350" r="40" fill="#0EA5B7" stroke="#22D3EE" stroke-width="3"/>
  <circle cx="750" cy="350" r="40" fill="#F97316" stroke="#FB923C" stroke-width="3"/>
  <circle cx="950" cy="350" r="40" fill="#F97316" stroke="#FB923C" stroke-width="3"/>
  <circle cx="350" cy="500" r="40" fill="#0EA5B7" stroke="#22D3EE" stroke-width="3"/>
  <circle cx="550" cy="500" r="40" fill="#0EA5B7" stroke="#22D3EE" stroke-width="3"/>
  <circle cx="750" cy="500" r="40" fill="#F97316" stroke="#FB923C" stroke-width="3"/>
  <circle cx="950" cy="500" r="40" fill="#F97316" stroke="#FB923C" stroke-width="3"/>
  <!-- Data Cards -->
  <rect x="250" y="620" width="180" height="100" rx="12" fill="#1A2332" stroke="#BAE6FD" stroke-opacity="0.4"/>
  <rect x="470" y="620" width="180" height="100" rx="12" fill="#1A2332" stroke="#BAE6FD" stroke-opacity="0.4"/>
  <rect x="690" y="620" width="180" height="100" rx="12" fill="#1A2332" stroke="#FED7AA" stroke-opacity="0.4"/>
