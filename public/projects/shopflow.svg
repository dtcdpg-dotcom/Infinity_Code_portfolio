  <rect x="200" y="200" width="320" height="600" rx="40" fill="#1E293B" stroke="#22D3EE" stroke-opacity="0.4"/>
  <rect x="220" y="230" width="280" height="540" rx="30" fill="url(#mobile)"/>
  <!-- POS Interface Elements -->
  <rect x="250" y="280" width="220" height="60" rx="12" fill="#0EA5B7" fill-opacity="0.4"/>
  <rect x="250" y="360" width="180" height="30" rx="8" fill="#BAE6FD" fill-opacity="0.5"/>
  <rect x="250" y="410" width="200" height="30" rx="8" fill="#BAE6FD" fill-opacity="0.3"/>
