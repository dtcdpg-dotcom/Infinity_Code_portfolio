  <rect x="410" y="480" width="60" height="60" rx="8" fill="#67E8F9" fill-opacity="0.4"/>
  <!-- Analytics Panel -->
  <rect x="600" y="200" width="700" height="600" rx="24" fill="#1E293B" stroke="#FB923C" stroke-opacity="0.3"/>
  <rect x="650" y="250" width="600" height="80" rx="16" fill="#0EA5B7" fill-opacity="0.3"/>
  <rect x="650" y="360" width="280" height="40" rx="10" fill="#BAE6FD" fill-opacity="0.4"/>
